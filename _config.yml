# Site settings
title:          MingJunDuan的博客
motto:          热爱可抵一切，探索未知之境
description:    "Rain is a simple and clean Jekyll theme with focus on content."
url:            https://github.com/MingJunDuan

# Author
author:
  name:         MingJunDuan
  email:        dmj1161859184@126.com
  url:          https://inelaah.com

# Build settings
markdown:       kramdown
exclude:
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - README.md
  - rain.gemspec

# Assets
sass:
  sass_dir:     _sass
  style:        compressed

# Gems
plugins:
  - jekyll-feed
  - jekyll-paginate
  # - jemoji #Uncomment this to allow emoji in your post

# Permalinks
permalink:      /:year-:month-:day/:title
future:         true
paginate:       5

# Related posts settings
related_posts_section:
  max_count:        5
  min_common_tags:  2

# Giscus comments
giscus:
  repo: MingJunDuan/mingjunduan.github.io
  repo_id: R_kgDOKq4gsw
  category_id: DIC_kwDOKq4gs84C_lne
  mapping: pathname
  reactions_enabled: 1
  theme: preferred_color_scheme
  lang: zh-CN

# Links to social media
social:
  email: dmj1161859184@126.com
  github: https://github.com/MingJunDuan
  twitter: https://twitter.com/MingjunD

